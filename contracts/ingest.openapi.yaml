openapi: 3.1.0
info:
  title: deedlit.ingest
  version: 0.1.0
  description: >
    Stateless ingest/index worker. Per-file pipeline computes
    sha256/phash/dims/WebP thumbnail, calls metadata + vision (dense + sparse),
    then fans out writes to catalog/search/graph (catalog-first, per-store retry).
    Also hosts maintenance job types. Holds no DB drivers.
servers:
  - url: http://deedlit-ingest:8000
paths:
  /health:
    get: { summary: Liveness, responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Health" } } } } } }
  /fs/browse:
    get:
      summary: List a directory on the ingest host (admin folder picker)
      description: >
        Read-only listing of the ingest worker's host filesystem so the admin
        directory picker can choose an ingest folder. Omit `path` for the
        synthetic roots view (drives/home/cwd).
      parameters: [ { name: path, in: query, required: false, schema: { type: string }, description: "Absolute directory to list; omit for roots view" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/FsBrowseResult" } } } }
        "400": { description: "Missing / denied / not a directory (user-correctable)" }
  /ingest:
    post:
      summary: Start an ingest job over a folder
      requestBody: { required: true, content: { application/json: { schema: { type: object, properties: { folderPath: { type: string } }, required: [folderPath] } } } }
      responses: { "202": { description: Job started, content: { application/json: { schema: { $ref: "#/components/schemas/Job" } } } } }
  /jobs:
    get:
      summary: List jobs (newest first) for the gateway/dashboard
      responses: { "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Job" } } } } } }
    post:
      summary: Start a maintenance job
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/MaintenanceRequest" } } } }
      responses: { "202": { description: Job started, content: { application/json: { schema: { $ref: "#/components/schemas/Job" } } } } }
  /jobs/{id}:
    get:
      parameters: [ { name: id, in: path, required: true, schema: { type: string } } ]
      summary: Job status / progress
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Job" } } } }, "404": { description: Not found } }
  /jobs/{id}/cancel:
    post:
      parameters: [ { name: id, in: path, required: true, schema: { type: string } } ]
      summary: Cancel a running job
      responses: { "200": { description: Cancelling } }
  /maintenance/missing-files:
    get:
      summary: Find cataloged images whose on-disk source file vanished
      description: >
        Read-only scan of catalog truth against the ingest worker's host
        filesystem: every record with a LOCAL filepath is probed with
        `os.path.exists` (blob-only `s3://` fallback paths are skipped). Backs the
        admin's missing-file cleanup review, which then un-indexes the stale
        records via the gateway's batch-delete. `limit` caps the returned list;
        `missing_count` is the exact total regardless.
      parameters: [ { name: limit, in: query, required: false, schema: { type: integer, minimum: 0, maximum: 5000, default: 500 }, description: "Cap on entries returned (the scan still walks the whole catalog)" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/MissingFilesResult" } } } }
  /activity:
    get:
      summary: Live work snapshot (in-flight count, throughput, current op)
      description: >
        Lightweight in-process counters for the UI system-activity board: how
        many requests are in flight, the trailing-60s completion rate, and the
        most recent non-probe request. Excludes the /health and /activity probes.
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Activity" } } } } }
components:
  schemas:
    Health: { type: object, properties: { status: { type: string, enum: [ok, degraded] } }, required: [status] }
    FsEntry:
      type: object
      properties: { name: { type: string }, path: { type: string }, isDirectory: { type: boolean } }
      required: [name, path, isDirectory]
    FsRoot:
      type: object
      properties: { label: { type: string }, path: { type: string } }
      required: [label, path]
    FsBrowseResult:
      type: object
      properties:
        path: { type: [string, "null"], description: "Absolute path listed, or null for the roots view" }
        parent: { type: [string, "null"], description: "Parent directory, or null at a filesystem root" }
        separator: { type: string }
        entries: { type: array, items: { $ref: "#/components/schemas/FsEntry" } }
        roots: { type: array, items: { $ref: "#/components/schemas/FsRoot" } }
      required: [path, parent, separator, entries, roots]
    MaintenanceRequest:
      type: object
      properties:
        type: { type: string, enum: [reindex-one-image, rescan-files, rebuild-search, rebuild-graph, rebuild-thumbnails, reconcile, label-backfill, prune-graph-orphans] }
        sha256: { type: [string, "null"], pattern: "^[a-f0-9]{64}$", description: "for reindex-one-image" }
      required: [type]
    MissingFile:
      type: object
      properties:
        sha256: { type: string, pattern: "^[a-f0-9]{64}$" }
        filepath: { type: string, description: "On-disk source path that no longer exists" }
        filename: { type: [string, "null"] }
        directory: { type: [string, "null"] }
      required: [sha256, filepath]
    MissingFilesResult:
      type: object
      properties:
        checked: { type: integer, description: "Records probed (those with a local filepath; blob-only skipped)" }
        missing: { type: array, items: { $ref: "#/components/schemas/MissingFile" }, description: "Orphaned entries, capped at the requested limit" }
        missing_count: { type: integer, description: "Exact total of orphaned entries (may exceed missing.length)" }
        truncated: { type: boolean, description: "True when more matched than were returned" }
      required: [checked, missing, missing_count, truncated]
    Job:
      type: object
      properties:
        id: { type: string }
        type: { type: string }
        status: { type: string, enum: [queued, running, completed, failed, cancelled] }
        progress: { type: object, properties: { total: { type: integer }, done: { type: integer }, skipped: { type: integer }, failed: { type: integer } } }
        error: { type: [string, "null"] }
        # Flattened aliases of `progress`/`error` for UI consumers (dashboard +
        # activity dock) that normalize on snake_case file counts.
        total_files: { type: integer }
        processed_files: { type: integer }
        skipped_files: { type: integer }
        failed_files: { type: integer }
        folder_path: { type: [string, "null"] }
        error_message: { type: [string, "null"] }
        # Live pipeline stage + lifecycle timestamps for the system-activity
        # board and the activity dock (which microservice is active, how long).
        current_stage: { type: [string, "null"], description: "Stage in progress: hash/metadata/label/vision:dense/vision:sparse/catalog/search/graph" }
        stage_counts: { type: object, additionalProperties: { type: integer }, description: "Per-stage count of files that have reached that stage" }
        created_at: { type: string, description: "ISO-8601 UTC, set on creation" }
        started_at: { type: [string, "null"], description: "ISO-8601 UTC, set when the job starts running" }
        finished_at: { type: [string, "null"], description: "ISO-8601 UTC, set when the job settles" }
      required: [id, type, status]
    Activity:
      type: object
      description: In-process live work snapshot for the system-activity board.
      properties:
        inflight: { type: integer, description: "Requests currently being handled" }
        per_min: { type: number, description: "Completions in the trailing 60s (≈ per-minute rate)" }
        busy: { type: boolean, description: "inflight > 0" }
        last_op: { type: [string, "null"], description: "Most recent non-probe request, e.g. 'POST /embed/image'" }
      required: [inflight, per_min, busy, last_op]
