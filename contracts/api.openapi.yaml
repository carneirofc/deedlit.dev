openapi: 3.1.0
info:
  title: deedlit.api
  version: 0.1.0
  description: >
    BFF gateway (no DB). Single base URL for the UI. Aggregates catalog + search
    + graph for detail pages (parallelized), hosts the MCP JSON-RPC surface,
    dispatches/proxies ingest jobs, and serves stats + jobs/health dashboard data.
servers:
  - url: http://deedlit-api:8000
paths:
  /health:
    get:
      summary: Gateway liveness + downstream service health
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/HealthDashboard" } } } } }
  /activity:
    get:
      summary: Aggregated live per-service work for the system-activity board
      description: >
        Probes every downstream service's /activity in parallel and returns one
        row per service (plus the gateway itself first). Mirrors /health: a
        downstream miss degrades to an idle row (busy=false, reachable=false)
        rather than failing the request.
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ActivityDashboard" } } } } }
  /detail/{sha256}:
    get:
      parameters: [ { name: sha256, in: path, required: true, schema: { $ref: "#/components/schemas/Sha256" } } ]
      summary: Aggregated detail (catalog + search neighbors + graph), parallel fan-out
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Detail" } } } } }
  /images/{sha256}:
    delete:
      parameters: [ { name: sha256, in: path, required: true, schema: { $ref: "#/components/schemas/Sha256" } } ]
      summary: Un-index an image (catalog record + search vector + graph node)
      description: >
        Deletes the image's INDEXATION, NOT the source file on disk. Catalog
        (source of truth) is deleted first — a 404 there is a 404 here, any other
        catalog failure is a 502 before projections are touched. With the record
        gone, the search point + graph node are cleaned best-effort in parallel;
        per-store outcomes are reported in the body (a failed projection delete
        leaves an orphan a reconcile/rebuild can prune).
      responses:
        "200": { description: Deleted, content: { application/json: { schema: { $ref: "#/components/schemas/DeleteResult" } } } }
        "404": { description: image not found }
        "502": { description: catalog unavailable }
  /search:
    post:
      summary: Hybrid search — encodes the text query via deedlit.vision, then queries deedlit.search
      description: >
        deedlit.search is a pure vector store (POST /query takes pre-computed
        dense/sparse vectors). The gateway encodes the text `query` via
        deedlit.vision (/embed/text + /embed/sparse) before querying search. An
        empty `query` has no vector and returns an empty result set; filter-only
        browse is not yet supported here.
      requestBody: { required: true, content: { application/json: { schema: { type: object, properties: { query: { type: string }, limit: { type: integer, default: 24 }, filter: { type: [object, "null"], additionalProperties: true } }, required: [query] } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { type: object, additionalProperties: true } } } } }
  /stats:
    get:
      summary: Aggregated library stats
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Stats" } } } } }
  /jobs:
    post:
      summary: Dispatch an ingest/maintenance job (proxy to ingest)
      requestBody: { required: true, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
      responses: { "202": { description: Started, content: { application/json: { schema: { type: object, additionalProperties: true } } } } }
    get:
      summary: List jobs (proxy to ingest) for the dashboard
      responses: { "200": { description: OK, content: { application/json: { schema: { type: array, items: { type: object, additionalProperties: true } } } } } }
  /blobs/{sha256}/{kind}:
    get:
      summary: Stream image bytes (thumbnail/embedding) from catalog
      description: >
        Proxies catalog GET /blobs/{sha256}/{kind} so the UI-only comfyhelper
        has a byte source for thumbnails/originals without holding an object store.
      parameters:
        - { name: sha256, in: path, required: true, schema: { type: string } }
        - { name: kind, in: path, required: true, schema: { type: string, enum: [thumbnail, embedding] } }
      responses:
        "200": { description: OK, content: { application/octet-stream: { schema: { type: string, format: binary } } } }
        "404": { description: blob not found }
        "502": { description: catalog unavailable }
  /folders:
    post:
      summary: Register a source folder (proxy to catalog)
      requestBody: { required: true, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { type: object, additionalProperties: true } } } } }
    get: { summary: List configured folders (proxy to catalog), responses: { "200": { description: OK, content: { application/json: { schema: { type: array, items: { type: object, additionalProperties: true } } } } } } }
  /folders/{id}:
    parameters: [ { name: id, in: path, required: true, schema: { type: string } } ]
    get: { summary: Read one folder (proxy to catalog), responses: { "200": { description: OK }, "404": { description: not found } } }
    patch:
      summary: Update folder controls (proxy to catalog)
      requestBody: { required: true, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
      responses: { "200": { description: OK }, "404": { description: not found } }
    delete: { summary: Remove a folder (proxy to catalog), responses: { "200": { description: Deleted }, "404": { description: not found } } }
  /folders/{id}/scan:
    post:
      parameters: [ { name: id, in: path, required: true, schema: { type: string } } ]
      summary: Scan now — resolve the folder path and dispatch an ingest job
      responses:
        "202": { description: Started, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
        "404": { description: folder not found }
        "502": { description: ingest unavailable }
  /images/unlabeled:
    get:
      summary: sha256 of images missing an AI label (proxy to catalog)
      parameters:
        - { name: limit, in: query, schema: { type: integer, default: 500 } }
        - { name: offset, in: query, schema: { type: integer, default: 0 } }
      responses: { "200": { description: OK, content: { application/json: { schema: { type: object, additionalProperties: true } } } } }
  /fs/browse:
    get:
      summary: List a directory for the admin folder picker (proxy to ingest)
      description: >
        Proxies deedlit.ingest's /fs/browse — the ingest worker owns the host
        filesystem the ingest paths live on. Omit `path` for the roots view.
      parameters: [ { name: path, in: query, required: false, schema: { type: string }, description: "Absolute directory to list; omit for roots view" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
        "400": { description: "Missing / denied / not a directory (user-correctable)" }
        "502": { description: ingest unavailable }
  /mcp:
    post:
      summary: MCP JSON-RPC over HTTP
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/JsonRpcRequest" } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonRpcResponse" } } } } }
components:
  schemas:
    Sha256: { type: string, pattern: "^[a-f0-9]{64}$" }
    ServiceHealth: { type: object, properties: { name: { type: string }, status: { type: string, enum: [ok, degraded, down] }, detail: { type: object, additionalProperties: true, description: "Downstream readiness flags (db_ready, blob_ready, neo4j_ready, collection_ready, vision_ready, …)" } }, required: [name, status] }
    HealthDashboard:
      type: object
      properties:
        status: { type: string, enum: [ok, degraded] }
        services: { type: array, items: { $ref: "#/components/schemas/ServiceHealth" } }
      required: [status]
    ServiceActivity:
      type: object
      properties:
        name: { type: string }
        inflight: { type: integer, description: "Requests in flight on that service" }
        per_min: { type: number, description: "Completions in the trailing 60s" }
        busy: { type: boolean }
        last_op: { type: [string, "null"], description: "Most recent non-probe request" }
        reachable: { type: boolean, description: "false when the gateway couldn't reach the service" }
      required: [name, inflight, per_min, busy, reachable]
    ActivityDashboard:
      type: object
      properties:
        services: { type: array, items: { $ref: "#/components/schemas/ServiceActivity" } }
      required: [services]
    Detail:
      type: object
      properties:
        image: { type: object, additionalProperties: true, description: "from catalog" }
        similar: { type: array, items: { type: object, additionalProperties: true }, description: "from search" }
        neighbors: { type: array, items: { type: object, additionalProperties: true }, description: "from graph" }
      required: [image]
    Stats:
      type: object
      properties:
        images: { type: integer }
        tags: { type: integer }
        collections: { type: integer }
        notes: { type: integer }
      required: [images]
    DeleteResult:
      type: object
      properties:
        status: { type: string }
        sha256: { $ref: "#/components/schemas/Sha256" }
        catalog: { type: boolean, description: "catalog record removed (truth)" }
        search: { type: boolean, description: "search vector removed (best-effort)" }
        graph: { type: boolean, description: "graph node removed (best-effort)" }
      required: [status, sha256, catalog]
    JsonRpcRequest:
      type: object
      properties:
        jsonrpc: { type: string, enum: ["2.0"] }
        id: { type: [string, integer, "null"] }
        method: { type: string }
        params: { type: object, additionalProperties: true }
      required: [jsonrpc, method]
    JsonRpcResponse:
      type: object
      properties:
        jsonrpc: { type: string, enum: ["2.0"] }
        id: { type: [string, integer, "null"] }
        result: { type: object, additionalProperties: true }
        error: { type: [object, "null"], additionalProperties: true }
      required: [jsonrpc]
