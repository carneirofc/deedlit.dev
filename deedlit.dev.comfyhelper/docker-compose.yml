# Image-library data stack for deedlit.dev.comfyhelper.
#
#   docker compose up -d                            # databases only (run the app on host)
#   docker compose --profile app up -d              # databases + the Next.js app
#   docker compose --profile vision up -d           # databases + CLIP embedding service
#   docker compose --profile observability up -d    # databases + Grafana/Loki/Tempo/Alloy
#   docker compose --profile full up -d             # everything
#
# PostgreSQL is the canonical source of truth; Neo4j and Qdrant are rebuildable
# projections.  Security is intentionally open for v1 (local/self-hosted use).
#
# Observability: Alloy scrapes every container's logs into Loki and receives OTLP
# traces from the app into Tempo; explore both in Grafana (datasources are
# pre-provisioned, anonymous admin, no login). The app ships traces only when
# OTEL_EXPORTER_OTLP_ENDPOINT is set — it is, below, pointing at Alloy.
#
# Tool UIs:
#   ComfyUI         http://localhost:8188   (external — not in this compose)
#   deedlit.vision  http://localhost:8000
#   Neo4j Browser   http://localhost:7474
#   Qdrant Dashboard http://localhost:6333/dashboard
#   RustFS Console  http://localhost:9001
#   App             http://localhost:3000
#   Grafana         http://localhost:3001
#   Alloy           http://localhost:12345

name: comfyhelper

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: imageapp
      POSTGRES_PASSWORD: imageapp
      POSTGRES_DB: imageapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imageapp -d imageapp"]
      interval: 5s
      timeout: 5s
      retries: 20

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474" # HTTP browser UI
      - "7687:7687" # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333" # REST + dashboard
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  # RustFS: S3-compatible object storage for thumbnails + cached artifacts.
  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_VOLUMES: /data
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # console UI
    volumes:
      - rustfs_data:/data
      - rustfs_logs:/logs
    healthcheck:
      # RustFS S3 API answers 403 to an unauthenticated GET; curl (no -f) still
      # exits 0 once the port is serving HTTP. The image lacks bash.
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:9000"]
      interval: 10s
      timeout: 5s
      retries: 20

  # deedlit.metadata: stateless PNG metadata extraction (A1111 / ComfyUI).
  # No DB, no GPU. Ingest sends image bytes to POST /extract instead of parsing
  # metadata in-process. Listens on 8000 in-container; mapped to host 8005 so the
  # local-dev default (METADATA_API_URL=http://localhost:8005) works unchanged.
  metadata:
    profiles: ["metadata", "vision", "app", "full"]
    build:
      context: ../deedlit.metadata
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8005:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 20

  # deedlit.vision: CLIP embedding API (ViT-H-14 / ViT-bigG-14).
  # Requires NVIDIA GPU + nvidia-container-toolkit.
  # Set COMFYUI_ROOT_HOST to the absolute path of your ComfyUI installation so
  # the container can read the clip_vision .safetensors model files.
  # CPU fallback: set CLIP_DEVICE=cpu (slower, no GPU reservation needed).
  vision:
    profiles: ["vision", "full"]
    build:
      context: ../deedlit.vision
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      COMFYUI_ROOT: /comfyui
      CLIP_DEVICE: cuda
      CLIP_MODEL_PRESET: vit_h
      CLIP_FP16: "true"
    volumes:
      # Mount your local ComfyUI directory (read-only) so the vision model
      # weights are available inside the container.
      # Override by setting COMFYUI_ROOT_HOST in a .env file next to this
      # docker-compose.yml, e.g.:
      #   COMFYUI_ROOT_HOST=K:/comfyui/ComfyUI_windows_portable/ComfyUI
      - "${COMFYUI_ROOT_HOST:-K:/comfyui/ComfyUI_windows_portable/ComfyUI}:/comfyui:ro"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  app:
    profiles: ["app", "full"]
    build:
      context: ..
      dockerfile: deedlit.dev.comfyhelper/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://imageapp:imageapp@postgres:5432/imageapp
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      QDRANT_URL: http://qdrant:6333
      # Browser-reachable base URL baked into Qdrant payload proxy URLs so images
      # render in the Qdrant dashboard / vision test UI. Must be the host-mapped
      # address (the browser is outside the compose network), not http://app:3000.
      COMFYHELPER_PUBLIC_URL: http://localhost:3000
      IMAGE_LIBRARY_ROOT: /library/images
      THUMBNAIL_ROOT: /library/thumbnails
      MCP_ENABLED: "true"
      ENABLE_EXTERNAL_VISION_ENRICHMENT: "false"
      EXTERNAL_VISION_PROVIDER: none
      # RustFS / S3 object storage for thumbnails + embedding cache.
      OBJECT_STORE_ENABLED: "true"
      OBJECT_STORE_ENDPOINT: http://rustfs:9000
      OBJECT_STORE_ACCESS_KEY: rustfsadmin
      OBJECT_STORE_SECRET_KEY: rustfsadmin
      OBJECT_STORE_BUCKET: comfyhelper
      # deedlit.metadata extraction API (in-network hostname).
      METADATA_API_URL: http://metadata:8000
      # deedlit.vision CLIP embedding API.
      # When vision profile is active, point to the vision service.
      # REQUIRED — there is no local fallback; ingest/search error if unset.
      CLIP_VISION_API_URL: http://vision:8000
      # Must match the CLIP model dimension: 1024 (vit_h) or 1280 (big_g).
      # Changing this after indexing requires a Qdrant rebuild.
      EMBEDDING_DIMENSIONS: "1024"
      # OpenTelemetry -> Alloy -> Tempo. Harmless when the observability profile
      # is not running (the exporter just fails quietly). Drop the observability
      # services in alongside the app with `--profile full` to capture traces.
      OTEL_SERVICE_NAME: comfyhelper
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
    volumes:
      - ./library:/library
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      metadata:
        condition: service_healthy

  # --- Observability ------------------------------------------------------
  # Loki: log aggregation (filesystem-backed, 7-day retention).
  loki:
    image: grafana/loki:3.3.2
    profiles: ["observability", "full"]
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki

  # Tempo: distributed trace storage; OTLP receivers on 4317/4318.
  tempo:
    image: grafana/tempo:2.6.1
    profiles: ["observability", "full"]
    restart: unless-stopped
    command: -config.file=/etc/tempo/tempo-config.yaml
    ports:
      - "3200:3200" # Tempo API (queried by Grafana)
    volumes:
      - ./observability/tempo/tempo-config.yaml:/etc/tempo/tempo-config.yaml:ro
      - tempo_data:/var/tempo

  # Alloy: collector. Scrapes Docker logs -> Loki, receives OTLP -> Tempo.
  # Needs the Docker socket to discover and tail container logs.
  alloy:
    image: grafana/alloy:v1.5.1
    profiles: ["observability", "full"]
    restart: unless-stopped
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    ports:
      - "12345:12345" # Alloy UI
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data:/var/lib/alloy/data
    depends_on:
      - loki
      - tempo

  # Grafana: UI for Loki + Tempo (datasources pre-provisioned, anonymous admin).
  grafana:
    image: grafana/grafana:11.4.0
    profiles: ["observability", "full"]
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    ports:
      - "3001:3000" # 3000 is taken by the app, so map Grafana to 3001
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
      - tempo

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  rustfs_data:
  rustfs_logs:
  loki_data:
  tempo_data:
  alloy_data:
  grafana_data:
