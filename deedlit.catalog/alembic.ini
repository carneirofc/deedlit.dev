# Alembic configuration for the deedlit.catalog service.
#
# The catalog service OWNS this migration tree. The database URL is normally
# supplied at runtime via the CATALOG_DATABASE_URL environment variable
# (see alembic/env.py); the value below is only a local-dev default.
[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
sqlalchemy.url = postgresql+psycopg://imageapp:imageapp@localhost:5432/imageapp

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
