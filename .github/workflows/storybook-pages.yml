name: Deploy site + Storybook to GitHub Pages

# Publishes the deedlit.dev GitHub Pages site (https://carneirofc.github.io/deedlit.dev/):
#   /                 → the monorepo landing page (docs/site/index.html)
#   /ui/storybook/    → the @carneirofc/ui Storybook
# Both are assembled into a single Pages artifact so the root and Storybook read
# as one cohesive site.
on:
  push:
    branches: [master]
    paths:
      - 'deedlit.dev.ui/**'
      - 'docs/site/**'
      - 'docs/screenshots/**'
      - '.github/workflows/storybook-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # The lockfile is generated on Windows and contains no Linux entries for
      # native optional deps (oxc-*, lightningcss, …; npm/cli#4828) — npm ci and
      # even npm install against that lock skip them. Resolve fresh instead;
      # this build is a docs artifact, so lockfile determinism is not critical.
      - name: Install dependencies
        run: |
          rm package-lock.json
          npm install --no-audit --no-fund

      - name: Build Storybook
        run: npm run build-storybook --workspace @carneirofc/ui

      - name: Assemble Pages site (landing page + /ui/storybook)
        run: |
          mkdir -p _site/ui
          mv deedlit.dev.ui/storybook-static _site/ui/storybook
          cp docs/site/index.html _site/index.html
          cp deedlit.dev/public/icons/icon.svg _site/icon.svg
          cp -r docs/screenshots _site/screenshots
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
